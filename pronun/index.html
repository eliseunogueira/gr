<script>var lessonLanguage="German";var langShort="GER"; var mainHTML2 = '<main id="selectDiv" class="lessonMenus selectOff"> <div class="insideMenu"> <h1 class="mainTitle">Choose a sound to learn</h1> <p class="mainWarning"><strong style="color: #FC0;">YELLOW</strong> sounds are different from English.</p><p class="mainWarning"><strong>WHITE</strong> sounds are similar to English.</p><section id="sBox1" class="soundBox"> <div class="sectionTitle">Consonants & Sounds</div><div id="so1" class="soItems"> <div class="cMark"></div><div class="soText">B <i>(B sound)</i></div></div><div id="so2" class="soItems"> <div class="cMark"></div><div class="soText yell">B <i>(P sound)</i></div></div><div id="so3" class="soItems"> <div class="cMark"></div><div class="soText">C <i>soft</i></div></div><div id="so4" class="soItems"> <div class="cMark"></div><div class="soText">C <i>hard</i></div></div><div id="so5" class="soItems"> <div class="cMark"></div><div class="soText yell">CH</div></div><div id="so6" class="soItems"> <div class="cMark"></div><div class="soText yell">CH <i>harsh</i></div></div><div id="so7" class="soItems"> <div class="cMark"></div><div class="soText">D <i>(D sound)</i></div></div><div id="so8" class="soItems"> <div class="cMark"></div><div class="soText yell">D <i>(T sound)</i></div></div><div id="so9" class="soItems"> <div class="cMark"></div><div class="soText">F</div></div><div id="so10" class="soItems"> <div class="cMark"></div><div class="soText">G <i>(G sound)</i></div></div><div id="so11" class="soItems"> <div class="cMark"></div><div class="soText yell">G <i>(K sound)</i></div></div><div id="so12" class="soItems"> <div class="cMark"></div><div class="soText yell">iG</div></div><div id="so13" class="soItems"> <div class="cMark"></div><div class="soText">H</div></div><div id="so14" class="soItems"> <div class="cMark"></div><div class="soText yell">H <i>silent</i></div></div><div id="so15" class="soItems"> <div class="cMark"></div><div class="soText">H <i /strong>s","<strong>Au</strong>to","B<strong>au</strong>ch","Fr<strong>au</strong>","<strong>ÄU / EU</strong>","H<strong>äu</strong>ser","B<strong>äu</strong>me","M<strong>äu</strong>se","<strong>Eu</strong>ropa","n<strong>eu</strong>","<strong>IE</strong>","B<strong>ie</strong>r","L<strong>ie</strong>be","v<strong>ie</strong>r","L<strong>ie</strong>d","T<strong>ie</strong>r"];var engWordArray=["B","baby","boat","tree","letter","bed","B","calf","yellow","deaf","half","dust","C","Celsius","cent","Caesar","cellist","approximately","C","cousin","computer","coffee shop","cream","camouflage","CH","milk","books","chicken","through","Greek","CH","book","language","also","daughter","cloth","D","German","shower","thank you","December","Thursday","D","bath","dog","shirt","bicycle","thousand","F","foot","television","river","elephant","friend","G","health","money","gorilla","Grandparents","kangaroo","G","day","train","path","war","smart","iG","honey","ready","correct","funny","sad","H","hotel","house","hunger","heat","fall","H","teacher","to understand","pharmacy","year","teeth","H","hospital","train station","youth hostel","redhead","three hundred","J","boy","january","Jupiter","jacket","yoghurt","K","coffee","cat","child","dress","cake","L","sheet","key","flower","lamp","light","M","man","mother","people","engine","museum","N","nose","November","nine","ring","number","P","park","horse","police","passport","price","Qu","receipt","quiz","quality","aquarium","jellyfish","R","journey","skirt","restaurant","rain","America","S","juice","soap","son","sun","soup","S","glass","price","rice","ice","all","S","to talk","sport ","spider","city","street","SCH","castle","chocolate","black","flesh","fish","ß","greeting","white","thirty","fun","grandmother","V","bird","father","to sell","many","delay","W","wine","vehicle","forest","water","Switzerland","X","boxing","xylophone","taxi","complicated","axe","Y","pajamas","typical","secondary school","pyramid","papyrus","Y","baby","party","cellphone","yoga","yeti","Z","time","two","sugar","zebra","newspaper","A","evening","apple","map","color","noon","Ä","men","apples","bear","girl","luggage","E","drink","parents","to eat","English","pepper","I","island","idea","family","cinema","pen","O","telephone","fruit","red","October","suitcase","Ö","oil","Austria","to hear","to open","king","U","subway","chair","student","shoe","thirst","Ü","door","kitchen","pupil","bye","breakfast","AI / EI","no","free","leg","string","May","AU","brown","mouse","car","stomach","woman","ÄU / EU","houses","trees","mice","Europe","new","IE","beer","love","four","song","animal"];var descArray=["When <strong>B</strong> is at the beginning or in the middle of a word, it is pronounced very similarly to English.","When <strong>B</strong> is at the end of a word, it is pronounced like a <strong>P</strong>.","The letter <strong>C</strong> is usually followed by the letter <strong>H</strong> in German words. This makes the different <strong>CH</strong> sounds When in front of <strong>Ä</strong>, <strong>E</strong>, <strong>I</strong> or <strong>Ö</strong>, is it usually a word of foreign origin. It is pronounced slightly differently depending on the origin of the word.","<strong>C</strong> before any other letter (with the exception of <strong>H</strong>) is pronounced like a <strong>K</strong>. Again, this is mostly for foreign words.","The <strong>CH</strong> sound does not have any English equivalent. When <strong>CH</strong> follows a <strong>consonant</strong> or the letters <strong>Ä</strong>, <strong>E</strong>, <strong>I</strong>, <strong>Ö</strong> and<strong> AI,</strong> it is pronounced like such...","When <strong>CH</strong> follows the vowels <strong>A</strong>, <strong>O</strong> and<strong> U</strong>, it has a more guttural sound and is the reason why some people may think German sounds a little harsh sometimes. It may sound similar to the sound people make when they clear their throat.","<strong>D</strong> located at the beginning or in the middle of a word is pronounced very similarly to English, but is a little sharper.","<strong>D</strong> at the end of a word is pronounced like a <strong>T</strong>.","<strong>F</strong> is pronounced similarly to English.","<strong>G</strong> located at the beginning or in the middle of a word is pronounced very similarly to English.","When <strong>G</strong> is at the end of a word, it is pronounced like a <strong>K</strong>, unless it follows the letter <strong>I</strong>.","The letters <strong>iG</strong> at the end of a word are pronounced similarly to the ''ish'' sound in the word ''fish'', without making the full ''ish'' sound.","The letter <strong>H</strong> at the beginning of a word is always pronounced and is voiced similarly to the <strong>H</strong> in ''home'' or ''happy''.","The letter <strong>H</strong> in the middle of a word is silent. If it follows a vowel, the pronunciation of the vowel is drawn out.","However, keep in mind that many German words are in fact compound words. When the letter <strong>H</strong> is at the beginning of a word that would have a meaning on its own, it is voiced.","The letter<strong> J</strong> in German is almost always pronounced like the English <strong>Y</strong>, with the exception of some imported English words like ''jeans'' or ''jazz'' which keep the <strong>J</strong> sound.","<strong>K</strong> is used in many German words and is pronounced similarly to English.","<strong>L</strong> is pronounced similarly to English.","<strong>M</strong> is pronounced similarly to English.","<strong>N</strong> is pronounced similarly to English.","The letter <strong>P</strong> is pronounced similarly to English.","In German, the letter <strong>Q</strong> is always followed by the letter <strong>U</strong> and is pronounced ''KV''.","The German <strong>R</strong> is rolled towards the back of the throat to make a rasping sound. It may be difficult to reproduce for English speakers.","The German <strong>S</strong> is pronounced like the <strong>Z</strong> in ''zoo'', unless it is followed by the letters <strong>CH</strong>, or followed by the letter <strong>P</strong> or <strong>T</strong> at the beginning of a word.","The letter <strong>S</strong> at the end of a word is pronounced like the<strong> S</strong> in ''soap''.","Before a <strong>P</strong> or a <strong>T</strong> at the beginning of a word, the letter <strong>S</strong> is pronounced like the <strong>SH</strong> sound in ''sheep''.","The German <strong>SCH</strong> sound is pronounced like the <strong>SH</strong> sound in ''sheep'', but with lips a little more rounded.","German has a unique letter, the <strong>ß</strong> (Eszett) which is pronounced like <strong>SS</strong>.","The German <strong>V</strong> is generally pronounced like the English <strong>F</strong>, although there are some exceptions where it is pronounced like the letter <strong>V</strong> (in the German words ''Vase'' or ''November'', for example).","The German <strong>W</strong> is pronounced like the English <strong>V</strong> and is always fully voiced.","<strong>X</strong> is very rare in German and is found mostly in words of foreign origin. <strong>X</strong> is pronounced similarly to English.","<strong>Y</strong> in the middle of a word is pronounced similar to the <strong>U</strong> sound in the English word ''pure'' (but not quite), or the German <strong>Ü</strong> sound.","At the beginning or at the end of a word, <strong>Y</strong> is pronounced just like in English. These words are usually imports from foreign languages.","The German <strong>Z</strong> is pronounced ''ts''.","The letter <strong>A</strong> is mostly pronounced similarly to the <strong>A</strong> in ''father''.","The letter <strong>Ä</strong> is pronounced like the <strong>AY</strong> sound in the word ''day''. It is often used in plural words.","The letter <strong>E</strong> is often pronounced like the <strong>E</strong> in the word ''set'' or the<strong> EE</strong> in the word ''need''. It is generally similar to the pronunciation of the letter <strong>Ä</strong>.","The letter <strong>I</strong> is pronounced similarly to the <strong>EE</strong> in ''bee'' or the <strong>I</strong> in the word ''lip''.","The letter <strong>O</strong> is pronounced similarly to English.","The letter <strong>Ö</strong> has no equivalent sound in English. It is similar to the German <strong>E</strong> pronunciation, but more rounded.","<strong>U</strong> is usually pronounced similarly to the <strong>OO</strong> in ''boot'', but with the lips more rounded.","The <strong>Ü</strong> sound may be hard for English speakers to pronounce, there is no real English equivalent.","The diphthongs <strong>AI</strong> and <strong>EI</strong> are pronounced by saying the <strong>A</strong> sound then gliding to the <strong>I</strong> sound. The result should be similar to the <strong>I</strong> sound in the word ''light''. Both diphthongs are pronounced the same way.","The diphthong <strong>AU</strong> is pronounced by saying <strong>A</strong> then gliding to the <strong>U</strong> sound. The final sound is similar to the <strong>OW</strong> in ''cow'', but with the sound starting deeper down the throat.","The diphthongs <strong>ÄU</strong> and <strong>EU</strong> are pronounced like the <strong>OY</strong> sound in the word ''boy''. Both diphthongs are pronounced the same way.","The diphthong IE is simply pronounced like a longer German I sound."];///END ADD</script><script src="../scripts/jquery-1.11.0.min.js"></script><script src="../scripts/jquery.transit.min.js"></script><script src="../scripts/hammer.min.js"></script><script src="../scripts/jquery.hammer.min.js"></script><script src="../scripts/jquery.ui.touch-punch.min.js"></script><script src="../scripts/jquery.caret.js"></script><script src="../scripts/CSSPlugin.min.js"></script><script src="../scripts/EasePack.min.js"></script><script src="../scripts/TweenLite.min.js"></script><script src="cdn/
